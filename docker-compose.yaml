services:
  postgres_17:
    build:
      context: Tools
      dockerfile: postgres_17.dockerfile
    volumes:
      - ./certs:/certs/
      - postgres_17:/var/run/postgresql
    ports:
      - 6453:5432
    depends_on:
      certs:
        condition: service_completed_successfully

  certs:
    build: 
      context: Tools
      dockerfile: certs.dockerfile
    volumes:
      - ./certs:/certs

  test:
    image: swift:6.1.0
    volumes:
      - .:/app
      - postgres_17:/postgres_17
    working_dir: /app
    command: ["swift", "test"]
    environment:
      - POSTGRES_17_HOST=postgres_plain_trust
      - POSTGRES_17_PORT=5432
      - POSTGRES_17_SOCKET=/postgres_17
    depends_on:
      postgres_17:
        condition: service_healthy

volumes:
  postgres_17:
