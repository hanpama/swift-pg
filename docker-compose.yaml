services:
  postgres_insecure:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    command: ["postgres", "-c", "log_statement=all", "-c", "log_connections=on", "-c", "log_disconnections=on", "-c", "log_duration=on"]
    ports:
      - 6450:5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      start_period: 5s
      start_interval: 5s

  postgres_secure:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    command: ["postgres", "-c", "log_statement=all", "-c", "log_connections=on", "-c", "log_disconnections=on", "-c", "log_duration=on"]
    ports:
      - 6451:5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      start_period: 5s
      start_interval: 5s


  postgres_ssl:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
    - ./certs:/certs
    command: [
      "postgres",
      "-c", "log_statement=all",
      "-c", "log_connections=on",
      "-c", "log_disconnections=on",
      "-c", "log_duration=on",
      "-c", "ssl=on",
      "-c", "ssl_cert_file=/certs/server.crt",
      "-c", "ssl_key_file=/certs/server.key"
    ]
    ports:
      - 6452:5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      start_period: 5s
      start_interval: 5s
    depends_on:
      openssl:
        condition: service_completed_successfully

  openssl:
    image: alpine:3.14 # Using a slightly newer alpine, but 3.14 should be fine too
    command: >
      sh -c "apk add --no-cache openssl &&
        # 1. Create Root CA
        openssl genrsa -out /certs/rootCA.key 2048 &&
        openssl req -x509 -new -nodes -key /certs/rootCA.key -sha256 -days 1024 -out /certs/rootCA.crt -subj '/CN=Test Root CA' &&
        # 2. Create Server Cert signed by Root CA
        openssl genrsa -out /certs/server.key 2048 &&
        openssl req -new -key /certs/server.key -out /certs/server.csr -subj '/CN=postgres_ssl' &&
        openssl x509 -req -in /certs/server.csr -CA /certs/rootCA.crt -CAkey /certs/rootCA.key -CAcreateserial -out /certs/server.crt -days 500 -sha256 &&
        # 3. Create another Root CA for failing tests
        openssl genrsa -out /certs/rootCA-fail.key 2048 &&
        openssl req -x509 -new -nodes -key /certs/rootCA-fail.key -sha256 -days 1024 -out /certs/rootCA-fail.crt -subj '/CN=Test Failing Root CA' &&
        # Set permissions for server key
        chmod 600 /certs/server.key &&
        chown 999:999 /certs/server.key" # Assuming postgres user ID is 999
    volumes:
      - ./certs:/certs

  test:
    image: swift:6.0.3
    volumes:
      - .:/app
    working_dir: /app
    command: ["swift", "test"]
    environment:
      - PG_INSECURE_HOST=postgres_insecure
      - PG_INSECURE_PORT=5432
      - PG_SECURE_HOST=postgres_secure
      - PG_SECURE_PORT=5432
      - PG_TLS_HOST=postgres_ssl
      - PG_TLS_PORT=5432
    depends_on:
      postgres_insecure:
        condition: service_healthy
      postgres_secure:
        condition: service_healthy
      postgres_ssl:
        condition: service_healthy
