services:
  postgres17:
    build:
      context: Tools
      dockerfile: postgres17.dockerfile
    volumes:
      - ./certs:/certs/
      - postgres17:/var/run/postgresql
    ports:
      - 6453:5432
    networks:
      default:
        aliases:
          - postgres17.goodcn
          - postgres17.badcn
    depends_on:
      certs:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
    command:
      [
        "postgres",
        "-c",
        "log_statement=all",
        "-c",
        "log_connections=on",
        "-c",
        "log_disconnections=on",
        "-c",
        "log_duration=on",
        "-c",
        "ssl=on",
        "-c",
        "ssl_cert_file=/certs/root_ca_1_postgres17.goodcn.crt.pem",
        "-c",
        "ssl_key_file=/certs/root_ca_1_postgres17.goodcn.key.pem",
        "-c",
        "ssl_ca_file=/certs/root_ca_1.crt.pem",
      ]

  postgres16:
    build:
      context: Tools
      dockerfile: postgres16.dockerfile
    volumes:
      - ./certs:/certs/
      - postgres16:/var/run/postgresql
    ports:
      - 6454:5432
    networks:
      default:
        aliases:
          - postgres16.goodcn
          - postgres16.badcn
    depends_on:
      certs:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
    command:
      [
        "postgres",
        "-c",
        "log_statement=all",
        "-c",
        "log_connections=on",
        "-c",
        "log_disconnections=on",
        "-c",
        "log_duration=on",
        "-c",
        "ssl=on",
        "-c",
        "ssl_cert_file=/certs/root_ca_1_postgres16.goodcn.crt.pem",
        "-c",
        "ssl_key_file=/certs/root_ca_1_postgres16.goodcn.key.pem",
        "-c",
        "ssl_ca_file=/certs/root_ca_1.crt.pem",
      ]

  certs:
    build:
      context: Tools
      dockerfile: certs.dockerfile
    volumes:
      - ./certs:/certs

  test:
    image: swift:6.1.0
    volumes:
      - .:/app
      - postgres17:/postgres17
      - postgres16:/postgres16
      - ./certs:/certs
    working_dir: /app
    command: [ "tail", "-f", "/dev/null"]
    environment:
      - POSTGRES_17_HOST=postgres17
      - POSTGRES_17_HOST_GOOD_CN=postgres17.goodcn
      - POSTGRES_17_HOST_BAD_CN=postgres17.badcn
      - POSTGRES_17_PORT=5432
      - POSTGRES_17_SOCKET=/postgres17
      - POSTGRES_16_HOST=postgres16
      - POSTGRES_16_HOST_GOOD_CN=postgres16.goodcn
      - POSTGRES_16_HOST_BAD_CN=postgres16.badcn
      - POSTGRES_16_PORT=5432
      - POSTGRES_16_SOCKET=/postgres16
      - ROOT_CERT=/certs/root_ca_1.crt.pem
      - ROOT_CERT_UNKNOWN=/certs/root_ca_2.crt.pem
      - CLIENT_CERT=/certs/root_ca_1_user_cert.crt.pem
      - CLIENT_KEY=/certs/root_ca_1_user_cert.key.pem
      - CLIENT_CERT_UNKNOWN=/certs/root_ca_2_user_cert.crt.pem
      - CLIENT_KEY_UNKNOWN=/certs/root_ca_2_user_cert.key.pem
    depends_on:
      postgres17:
        condition: service_healthy
      postgres16:
        condition: service_healthy

volumes:
  postgres17:
  postgres16:
