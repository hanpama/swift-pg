name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run build
      run: docker compose up --quiet-pull --build -d postgres17 postgres16
    - name: Run tests
      run: docker compose run --quiet-pull test
    - name: Show logs
      if: failure()
      run: docker compose logs
